<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 16; ry: 16; }
      .box-blue { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 16; ry: 16; }
      .box-green { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 16; ry: 16; }
      .box-yellow { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 16; ry: 16; }
      .box-red { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 16; ry: 16; }
      .box-purple { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2; rx: 16; ry: 16; }
      .section { font: 700 18px Arial, sans-serif; fill: #111827; }
      .text { font: 500 16px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <text x="800" y="52" text-anchor="middle" class="title">PaperMentor OS Agent 协作流程图</text>
  <text x="800" y="82" text-anchor="middle" class="subtitle">主控编排 + 分维评审 + 局部竞争 + 争议裁决 + 报告汇总</text>

  <rect x="80" y="120" width="240" height="100" class="box-blue"/>
  <text x="200" y="160" text-anchor="middle" class="section">1. 用户输入</text>
  <text x="200" y="190" text-anchor="middle" class="small">论文标题 / 摘要 / 正文 / 参考文献</text>

  <rect x="400" y="120" width="280" height="100" class="box-blue"/>
  <text x="540" y="160" text-anchor="middle" class="section">2. 输入解析层</text>
  <text x="540" y="190" text-anchor="middle" class="small">生成 PaperPackage 与章节锚点</text>

  <rect x="760" y="110" width="320" height="120" class="box-purple"/>
  <text x="920" y="150" text-anchor="middle" class="section">3. ChiefReviewer</text>
  <text x="920" y="180" text-anchor="middle" class="small">识别论文类型、阶段、学科</text>
  <text x="920" y="202" text-anchor="middle" class="small">选择 workflow、workers、skills</text>

  <rect x="1160" y="120" width="320" height="100" class="box-green"/>
  <text x="1320" y="160" text-anchor="middle" class="section">4. Review Plan</text>
  <text x="1320" y="190" text-anchor="middle" class="small">确定评审维度与执行顺序</text>

  <line x1="320" y1="170" x2="400" y2="170" class="arrow"/>
  <line x1="680" y1="170" x2="760" y2="170" class="arrow"/>
  <line x1="1080" y1="170" x2="1160" y2="170" class="arrow"/>

  <rect x="80" y="320" width="250" height="120" class="box"/>
  <text x="205" y="360" text-anchor="middle" class="section">5A. TopicScopeAgent</text>
  <text x="205" y="390" text-anchor="middle" class="small">选题价值</text>
  <text x="205" y="412" text-anchor="middle" class="small">问题清晰度 / 范围匹配</text>

  <rect x="360" y="320" width="250" height="120" class="box"/>
  <text x="485" y="360" text-anchor="middle" class="section">5B. LogicChainAgent</text>
  <text x="485" y="390" text-anchor="middle" class="small">论证链路</text>
  <text x="485" y="412" text-anchor="middle" class="small">claim-evidence 支撑关系</text>

  <rect x="640" y="320" width="250" height="120" class="box"/>
  <text x="765" y="360" text-anchor="middle" class="section">5C. LiteratureSupportAgent</text>
  <text x="765" y="390" text-anchor="middle" class="small">文献支撑</text>
  <text x="765" y="412" text-anchor="middle" class="small">相关工作 / 引用覆盖 / 缺口</text>

  <rect x="920" y="300" width="260" height="70" class="box-yellow"/>
  <text x="1050" y="340" text-anchor="middle" class="section">5D. NoveltyDepthAgent A</text>
  <rect x="920" y="390" width="260" height="70" class="box-yellow"/>
  <text x="1050" y="430" text-anchor="middle" class="section">5E. NoveltyDepthAgent B</text>

  <rect x="1210" y="320" width="250" height="120" class="box"/>
  <text x="1335" y="360" text-anchor="middle" class="section">5F. WritingFormatAgent</text>
  <text x="1335" y="390" text-anchor="middle" class="small">表达质量 / 格式规范</text>
  <text x="1335" y="412" text-anchor="middle" class="small">引用规范 / 结构完整性</text>

  <line x1="920" y1="230" x2="205" y2="320" class="arrow"/>
  <line x1="920" y1="230" x2="485" y2="320" class="arrow"/>
  <line x1="920" y1="230" x2="765" y2="320" class="arrow"/>
  <line x1="920" y1="230" x2="1050" y2="300" class="arrow"/>
  <line x1="920" y1="230" x2="1050" y2="390" class="arrow"/>
  <line x1="920" y1="230" x2="1335" y2="320" class="arrow"/>

  <rect x="560" y="520" width="480" height="110" class="box-red"/>
  <text x="800" y="560" text-anchor="middle" class="section">6. Disagreement Detection</text>
  <text x="800" y="590" text-anchor="middle" class="small">仅对主观模块检查结论冲突、低置信度、模糊判断</text>

  <line x1="1050" y1="460" x2="800" y2="520" class="arrow"/>
  <line x1="1050" y1="370" x2="800" y2="520" class="arrow"/>

  <rect x="260" y="690" width="300" height="120" class="box-green"/>
  <text x="410" y="730" text-anchor="middle" class="section">7A. 无明显分歧</text>
  <text x="410" y="760" text-anchor="middle" class="small">直接写入 EvidenceLedger</text>
  <text x="410" y="782" text-anchor="middle" class="small">保留 findings、severity、evidence</text>

  <rect x="700" y="680" width="340" height="140" class="box-red"/>
  <text x="870" y="720" text-anchor="middle" class="section">7B. DebateJudgeAgent</text>
  <text x="870" y="750" text-anchor="middle" class="small">只围绕争议点裁决</text>
  <text x="870" y="772" text-anchor="middle" class="small">判断是研究不足还是表达不足</text>
  <text x="870" y="794" text-anchor="middle" class="small">输出模块级最终结论</text>

  <line x1="700" y1="630" x2="470" y2="690" class="arrow"/>
  <line x1="900" y1="630" x2="870" y2="680" class="arrow"/>

  <rect x="1120" y="690" width="320" height="120" class="box-purple"/>
  <text x="1280" y="730" text-anchor="middle" class="section">8. EvidenceLedger</text>
  <text x="1280" y="760" text-anchor="middle" class="small">统一存 findings、证据锚点、来源</text>
  <text x="1280" y="782" text-anchor="middle" class="small">记录 debate 裁决与 skill 版本</text>

  <line x1="560" y1="750" x2="1120" y2="750" class="arrow"/>
  <line x1="1040" y1="750" x2="1120" y2="750" class="arrow"/>

  <rect x="1180" y="880" width="260" height="70" class="box-blue"/>
  <text x="1310" y="922" text-anchor="middle" class="section">9. GuidanceComposer</text>

  <rect x="840" y="870" width="280" height="90" class="box-green"/>
  <text x="980" y="905" text-anchor="middle" class="section">10. 最终报告输出</text>
  <text x="980" y="930" text-anchor="middle" class="small">总体总结 / 高优问题 / 修改顺序 / 下一步建议</text>

  <line x1="1280" y1="810" x2="1310" y2="880" class="arrow"/>
  <line x1="1180" y1="915" x2="1120" y2="915" class="arrow"/>

  <rect x="70" y="870" width="650" height="90" class="box-yellow"/>
  <text x="395" y="905" text-anchor="middle" class="section">核心产品逻辑</text>
  <text x="395" y="930" text-anchor="middle" class="small">并行发现问题，局部解决分歧，统一输出导师式指导，而不是让 agents 自由群聊</text>

  <line x1="980" y1="915" x2="720" y2="915" class="arrow dashed"/>
</svg>
